<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Text Guide</title>
    <style>
        /* Style for vertical text */
        .vertical-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <h1>Guide to Vertical Text</h1>
    <p class="vertical-text">This text is displayed vertically!</p>
    <p>Vertical text can be used in web design to enhance layout and presentation.</p>
</body>
</html>

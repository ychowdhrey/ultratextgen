  <style>
    /* ---- Vertical Text Page Styles ---- */
    .vt-section { max-width: 820px; margin: 0 auto; padding: 0 1rem; }
    .vt-title { font-size: 2rem; font-weight: 700; text-align: center; margin-top: 2rem; color: var(--text, #1e293b); }
    .vt-subtitle { font-size: 1rem; text-align: center; color: var(--text-muted, #64748b); margin-top: 0.5rem; margin-bottom: 1.5rem; }

    /* Input */
    .vt-input-wrap { position: relative; margin-bottom: 1.25rem; }
    .vt-input-wrap textarea {
      width: 100%; min-height: 80px; padding: 0.9rem 1rem; font-size: 1rem;
      border: 1px solid var(--border, #e2e8f0); border-radius: 10px;
      background: var(--surface, #fff); color: var(--text, #1e293b);
      font-family: inherit; resize: vertical; box-sizing: border-box;
    }
    .vt-char-count { text-align: right; font-size: 0.75rem; color: var(--text-muted, #64748b); margin-top: 0.25rem; }

    /* Selector rows */
    .vt-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted, #64748b); margin-bottom: 0.5rem; }
    .vt-chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .vt-chip {
      padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
      border: 1px solid var(--border, #e2e8f0); background: var(--surface, #fff);
      color: var(--text, #1e293b); cursor: pointer; transition: all 0.15s;
    }
    .vt-chip:hover { border-color: var(--accent, #6366f1); }
    .vt-chip.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }

    /* Toggle group */
    .vt-toggle-group { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .vt-toggle-group label {
      display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem;
      color: var(--text, #1e293b); cursor: pointer;
    }

    /* Decoration picker */
    .vt-deco-section { margin-bottom: 1.5rem; }
    .vt-deco-tabs { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.6rem; }
    .vt-deco-tab {
      padding: 0.3rem 0.7rem; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
      border: 1px solid var(--border, #e2e8f0); background: var(--surface, #fff);
      color: var(--text-muted, #64748b); cursor: pointer; transition: all 0.15s;
    }
    .vt-deco-tab:hover { border-color: var(--accent, #6366f1); }
    .vt-deco-tab.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }
    .vt-deco-panel {
      max-height: 180px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 0.35rem;
      padding: 0.5rem; border: 1px solid var(--border, #e2e8f0); border-radius: 10px;
      background: var(--surface, #fff);
    }
    .vt-deco-chip {
      padding: 0.3rem 0.65rem; border-radius: 16px; font-size: 0.82rem;
      border: 1px solid var(--border, #e2e8f0); background: var(--bg, #f8f9fa);
      color: var(--text, #1e293b); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .vt-deco-chip:hover { border-color: var(--accent, #6366f1); }
    .vt-deco-chip.active { background: var(--accent, #6366f1); color: #fff; border-color: var(--accent, #6366f1); }

    /* Recently used */
    .vt-recent-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .vt-recent-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted, #64748b); margin-bottom: 0.25rem; }

    /* Results grid */
    .vt-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .vt-card {
      background: var(--surface, #fff); border: 1px solid var(--border, #e2e8f0);
      border-radius: 12px; padding: 1rem 1.25rem; display: flex; flex-direction: column;
    }
    .vt-card-name { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted, #64748b); margin-bottom: 0.5rem; }
    .vt-card-output {
      font-family: 'Courier New', monospace; font-size: 1rem; line-height: 1.5;
      white-space: pre; color: var(--text, #1e293b); min-height: 3rem;
      overflow-x: auto; flex: 1; margin-bottom: 0.75rem;
    }
    .vt-card-output.placeholder { color: var(--text-muted, #94a3b8); font-style: italic; white-space: normal; }
    .vt-card-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .vt-copy-btn {
      padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      border: none; background: var(--accent, #6366f1); color: #fff; cursor: pointer;
      transition: opacity 0.15s;
    }
    .vt-copy-btn:hover { opacity: 0.85; }
    .vt-copy-btn:disabled { opacity: 0.4; cursor: default; }
    .vt-copy-btn.copied { background: #22c55e; }

<body>

  <main class="vt-section">
    <!-- 1. Title and subtitle -->
    <h1 class="vt-title">Vertical Text Generator</h1>
    <p class="vt-subtitle">Transform your text into vertical layouts — stacked, pyramid, diagonal and more. Copy and paste anywhere.</p>

    <!-- 2. Input textarea -->
    <div class="vt-input-wrap">
      <textarea id="vtInput" maxlength="500" placeholder="Type your text here…"></textarea>
      <div class="vt-char-count"><span id="vtCharCount">0</span> / 500</div>
    </div>

    <!-- 3. Layout selector -->
    <div class="vt-label">Layout</div>
    <div class="vt-chip-row" id="vtLayoutChips"></div>

    <!-- 4. Word handling controls -->
    <div class="vt-label">Word Break Mode</div>
    <div class="vt-toggle-group" id="vtWordBreak">
      <label><input type="radio" name="wordBreak" value="stack" checked> Stack</label>
      <label><input type="radio" name="wordBreak" value="continuous"> Continuous</label>
    </div>

    <div class="vt-label">Word Divider Mode</div>
    <div class="vt-toggle-group" id="vtWordDivider">
      <label><input type="radio" name="wordDivider" value="none" checked> None</label>
      <label><input type="radio" name="wordDivider" value="blank"> Blank line</label>
      <label><input type="radio" name="wordDivider" value="divider"> Divider line</label>
    </div>

    <!-- 5. Decoration selector -->
    <div class="vt-deco-section">
      <div class="vt-label">Decoration</div>
      <div class="vt-deco-tabs" id="vtDecoTabs"></div>
      <div class="vt-recent-label" id="vtRecentLabel" style="display:none">Recently Used</div>
      <div class="vt-recent-row" id="vtRecentRow"></div>
      <div class="vt-deco-panel" id="vtDecoPanel"></div>
    </div>

    <!-- 6. Result cards grid -->
    <div class="vt-results" id="vtResults"></div>
  </main>

  <!-- Modules -->
  <script src="vertical-layouts.js"></script>
  <script src="vertical-decoration.js"></script>

  <script>
  (function () {
    "use strict";

    var Layouts = window.VerticalLayouts;
    var Deco    = window.VerticalDecoration;
    if (!Layouts || !Deco) { console.error("Vertical modules missing"); return; }

    /* ---- refs ---- */
    var inputEl      = document.getElementById("vtInput");
    var charCountEl  = document.getElementById("vtCharCount");
    var layoutChips  = document.getElementById("vtLayoutChips");
    var resultsGrid  = document.getElementById("vtResults");
    var decoTabsEl   = document.getElementById("vtDecoTabs");
    var decoPanelEl  = document.getElementById("vtDecoPanel");
    var recentRowEl  = document.getElementById("vtRecentRow");
    var recentLblEl  = document.getElementById("vtRecentLabel");

    /* ---- state ---- */
    var selectedLayout = "stacked";
    var selectedDecoTab = "bullets";
    var selectedDecorator = null;
    var recentDecorators = [];
    var MAX_RECENT = 6;

    /* ---- layout chips ---- */
    Layouts.LAYOUTS.forEach(function (l) {
      var chip = document.createElement("button");
      chip.className = "vt-chip" + (l.id === selectedLayout ? " active" : "");
      chip.textContent = l.name;
      chip.dataset.id = l.id;
      chip.addEventListener("click", function () {
        selectedLayout = l.id;
        layoutChips.querySelectorAll(".vt-chip").forEach(function (c) { c.classList.remove("active"); });
        chip.classList.add("active");
        renderAll();
      });
      layoutChips.appendChild(chip);
    });

    /* ---- decoration tabs ---- */
    var decoGroups = Object.keys(Deco.verticalDecorations);

    // add "none" pseudo-tab
    function buildDecoTabs() {
      decoTabsEl.innerHTML = "";
      // None tab
      var noneTab = document.createElement("button");
      noneTab.className = "vt-deco-tab" + (selectedDecoTab === "none" ? " active" : "");
      noneTab.textContent = "None";
      noneTab.addEventListener("click", function () {
        selectedDecoTab = "none";
        selectedDecorator = null;
        buildDecoTabs();
        buildDecoPanel();
        renderAll();
      });
      decoTabsEl.appendChild(noneTab);

      decoGroups.forEach(function (g) {
        var tab = document.createElement("button");
        tab.className = "vt-deco-tab" + (selectedDecoTab === g ? " active" : "");
        tab.textContent = g.charAt(0).toUpperCase() + g.slice(1);
        tab.addEventListener("click", function () {
          selectedDecoTab = g;
          buildDecoTabs();
          buildDecoPanel();
        });
        decoTabsEl.appendChild(tab);
      });
    }

    function buildDecoPanel() {
      decoPanelEl.innerHTML = "";
      if (selectedDecoTab === "none") return;
      var items = Deco.verticalDecorations[selectedDecoTab] || [];
      items.forEach(function (item) {
        var chip = document.createElement("button");
        chip.className = "vt-deco-chip" + (selectedDecorator === item ? " active" : "");
        chip.textContent = item.text;
        chip.addEventListener("click", function () {
          selectedDecorator = (selectedDecorator === item) ? null : item;
          if (selectedDecorator) addRecent(item);
          buildDecoPanel();
          buildRecentRow();
          renderAll();
        });
        decoPanelEl.appendChild(chip);
      });
    }

    /* ---- recently used ---- */
    function addRecent(item) {
      recentDecorators = recentDecorators.filter(function (r) { return r !== item; });
      recentDecorators.unshift(item);
      if (recentDecorators.length > MAX_RECENT) recentDecorators = recentDecorators.slice(0, MAX_RECENT);
    }

    function buildRecentRow() {
      recentRowEl.innerHTML = "";
      if (recentDecorators.length === 0) { recentLblEl.style.display = "none"; return; }
      recentLblEl.style.display = "";
      recentDecorators.forEach(function (item) {
        var chip = document.createElement("button");
        chip.className = "vt-deco-chip" + (selectedDecorator === item ? " active" : "");
        chip.textContent = item.text;
        chip.addEventListener("click", function () {
          selectedDecorator = (selectedDecorator === item) ? null : item;
          buildDecoPanel();
          buildRecentRow();
          renderAll();
        });
        recentRowEl.appendChild(chip);
      });
    }

    /* ---- word handling helpers ---- */
    function getWordBreak() {
      var el = document.querySelector('input[name="wordBreak"]:checked');
      return el ? el.value : "stack";
    }
    function getWordDivider() {
      var el = document.querySelector('input[name="wordDivider"]:checked');
      return el ? el.value : "none";
    }

    /* ---- rendering ---- */
    function generateOutput(layoutDef, words) {
      var mode = getWordBreak();
      if (layoutDef.usesMode) {
        return layoutDef.fn(words, mode);
      }
      return layoutDef.fn(words);
    }

    function applyWordDivider(output, dividerMode) {
      if (dividerMode === "none" || !output) return output;
      // The layouts that use "stack" mode already separate words with blank lines.
      // "blank" keeps that; "divider" replaces blank-line separators with a divider line.
      if (dividerMode === "divider") {
        return output.replace(/\n\n/g, "\n──────\n");
      }
      return output; // "blank" is default behavior
    }

    function safeAttr(str) {
      return String(str || "").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderAll() {
      var text = (inputEl.value || "").trim();
      resultsGrid.innerHTML = "";

      if (!text) {
        Layouts.LAYOUTS.forEach(function (l) {
          resultsGrid.appendChild(makeCard(l.name, "", true));
        });
        return;
      }

      var words = Layouts.splitWords(text);
      var dividerMode = getWordDivider();

      Layouts.LAYOUTS.forEach(function (l) {
        var raw = generateOutput(l, words);
        var divided = applyWordDivider(raw, dividerMode);
        var final = selectedDecorator
          ? Deco.applyVerticalDecorator(divided, selectedDecorator, l.id)
          : divided;
        resultsGrid.appendChild(makeCard(l.name, final, false));
      });
    }

    function makeCard(name, output, empty) {
      var card = document.createElement("div");
      card.className = "vt-card";
      var escapedOutput = safeAttr(output);
      card.innerHTML =
        '<div class="vt-card-name">' + name + '</div>' +
        '<pre class="vt-card-output' + (empty ? ' placeholder' : '') + '">' +
          (empty ? 'Type something above…' : escapeHtml(output)) +
        '</pre>' +
        '<div class="vt-card-actions">' +
          '<button class="vt-copy-btn" data-text="' + escapedOutput + '"' + (empty ? ' disabled' : '') + '>Copy</button>' +
        '</div>';
      return card;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    /* ---- copy handler ---- */
    document.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest(".vt-copy-btn") : null;
      if (!btn || btn.disabled) return;
      var text = btn.dataset.text || "";
      navigator.clipboard.writeText(text).then(function () {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: "copy_text", copy_method: "button" });
        btn.textContent = "✓ Copied";
        btn.classList.add("copied");
        setTimeout(function () { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
      }).catch(function (err) { console.error("Copy failed:", err); });
    });

    /* ---- event listeners ---- */
    inputEl.addEventListener("input", function () {
      charCountEl.textContent = inputEl.value.length;
      renderAll();
    });

    document.querySelectorAll('input[name="wordBreak"], input[name="wordDivider"]').forEach(function (r) {
      r.addEventListener("change", renderAll);
    });

    /* ---- init ---- */
    buildDecoTabs();
    buildDecoPanel();
    renderAll();
  })();
  </script>

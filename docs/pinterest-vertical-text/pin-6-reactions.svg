  <rect x="140" y="500" width="720" height="545" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <g text-anchor="middle" font-size="56" font-weight="700" fill="url(#g)">
<text x="255" y="664.0">W</text>
<text x="255" y="728.0">A</text>
<text x="255" y="792.0">I</text>
<text x="255" y="856.0">T</text>
</g>
  <g text-anchor="middle" font-size="56" font-weight="700" fill="url(#g)">
<text x="420" y="664.0">T</text>
<text x="420" y="728.0">H</text>
<text x="420" y="792.0">I</text>
<text x="420" y="856.0">S</text>
</g>
  <g text-anchor="middle" font-size="56" font-weight="700" fill="url(#g)">
<text x="585" y="664.0">R</text>
<text x="585" y="728.0">E</text>
<text x="585" y="792.0">A</text>
<text x="585" y="856.0">L</text>
</g>
  <g text-anchor="middle" font-size="56" font-weight="700" fill="url(#g)">
<text x="750" y="664.0">S</text>
<text x="750" y="728.0">T</text>

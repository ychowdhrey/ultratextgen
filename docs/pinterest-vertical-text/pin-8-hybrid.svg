<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" role="img" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.16"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1a2e" opacity="0.05"/>
    </pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#1a1a2e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="1500" fill="#FBFBFE"/>
  <rect width="1000" height="1500" fill="url(#dots)"/>
  <circle cx="850" cy="180" r="360" fill="url(#glow)"/>
  <rect width="1000" height="14" fill="url(#gh)"/>
  <text x="500" y="92" text-anchor="middle" font-size="28" font-weight="700" letter-spacing="6" fill="#64748b">ULTRATEXTGEN.COM</text>
  <rect x="353" y="128" width="294" height="50" rx="25" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="500" y="161" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="2" fill="#8b5cf6">THE HYBRID LAYOUT</text>
  <text x="500" y="300" text-anchor="middle" font-size="74" font-weight="700" fill="#1a1a2e">One vertical word +</text>
  <text x="500" y="392" text-anchor="middle" font-size="74" font-weight="700" fill="url(#g)">one horizontal line</text>
  <rect x="140" y="500" width="720" height="545" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <g stroke="#64748b" stroke-width="11" stroke-linecap="round" opacity="0.16">
    <line x1="500" y1="560" x2="790" y2="560"/><line x1="500" y1="628" x2="760" y2="628"/>
  </g>
  <g text-anchor="middle" font-size="118" font-weight="700" fill="url(#g)">
<text x="330" y="650">H</text>
<text x="330" y="775">E</text>
<text x="330" y="900">Y</text>
</g>
  <text x="500" y="726" font-size="30" font-weight="600" fill="#1a1a2e">I built</text>
  <text x="500" y="770" font-size="30" font-weight="600" fill="#1a1a2e">something</text>
  <text x="500" y="814" font-size="30" font-weight="600" fill="#1a1a2e">for you</text>
  <text x="500" y="1012" text-anchor="middle" font-size="26" fill="#64748b">stop the scroll without losing the message</text>
  <rect x="271" y="1235" width="458" height="96" rx="48" fill="url(#gh)" filter="url(#sh)"/>
  <text x="500" y="1296" text-anchor="middle" font-size="38" font-weight="700" fill="#ffffff">See how it works →</text>
  <text x="500" y="1432" text-anchor="middle" font-size="27" fill="#94a3b8">ultratextgen.com/guide/vertical-text-guide</text>

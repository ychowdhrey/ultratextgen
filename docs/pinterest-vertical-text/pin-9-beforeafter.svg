<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" role="img" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.16"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#1a1a2e" opacity="0.05"/>
    </pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#1a1a2e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="1500" fill="#FBFBFE"/>
  <rect width="1000" height="1500" fill="url(#dots)"/>
  <circle cx="850" cy="180" r="360" fill="url(#glow)"/>
  <rect width="1000" height="14" fill="url(#gh)"/>
  <text x="500" y="92" text-anchor="middle" font-size="28" font-weight="700" letter-spacing="6" fill="#64748b">ULTRATEXTGEN.COM</text>
  <rect x="374" y="128" width="252" height="50" rx="25" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="500" y="161" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="2" fill="#8b5cf6">BEFORE / AFTER</text>
  <text x="500" y="300" text-anchor="middle" font-size="74" font-weight="700" fill="#1a1a2e">Same post.</text>
  <text x="500" y="392" text-anchor="middle" font-size="74" font-weight="700" fill="url(#g)">One stops the scroll.</text>
  <rect x="140" y="500" width="720" height="545" rx="30" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="180" y="560" width="300" height="370" rx="20" fill="#f8fafc" stroke="#e2e8f0"/>
  <g stroke="#cbd5e1" stroke-width="10" stroke-linecap="round">
    <line x1="215" y1="620" x2="445" y2="620"/>
    <line x1="215" y1="670" x2="445" y2="670"/>
    <line x1="215" y1="720" x2="445" y2="720"/>
    <line x1="215" y1="770" x2="445" y2="770"/>
    <line x1="215" y1="820" x2="445" y2="820"/>
  </g>
  <text x="330" y="900" text-anchor="middle" font-size="25" fill="#94a3b8">scrolled past</text>
  <rect x="520" y="560" width="300" height="370" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-opacity="0.35"/>
  <g text-anchor="middle" font-size="64" font-weight="700" fill="url(#g)">
<text x="585" y="620">W</text>
<text x="585" y="690">A</text>
<text x="585" y="760">I</text>
<text x="585" y="830">T</text>
</g>
  <g stroke="#cbd5e1" stroke-width="10" stroke-linecap="round">
    <line x1="650" y1="640" x2="790" y2="640"/>
    <line x1="650" y1="700" x2="790" y2="700"/>
    <line x1="650" y1="760" x2="790" y2="760"/>
  </g>
  <text x="670" y="900" text-anchor="middle" font-size="25" font-weight="700" fill="#8b5cf6">stopped</text>
  <text x="500" y="1012" text-anchor="middle" font-size="26" fill="#64748b">a flat caption vs. a vertical hook</text>
  <rect x="271" y="1235" width="458" height="96" rx="48" fill="url(#gh)" filter="url(#sh)"/>
  <text x="500" y="1296" text-anchor="middle" font-size="38" font-weight="700" fill="#ffffff">See why it works →</text>
  <text x="500" y="1432" text-anchor="middle" font-size="27" fill="#94a3b8">ultratextgen.com/guide/vertical-text-guide</text>

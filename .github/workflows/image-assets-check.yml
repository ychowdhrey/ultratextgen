name: Image Asset Check

on:
  pull_request:
    paths:
      - '**/*.html'
      - 'assets/og/**'
      - 'assets/hero/**'
      - 'assets/pinterest/**'
      - 'scripts/check-image-assets.py'
      - '.github/workflows/image-assets-check.yml'
  workflow_dispatch:

jobs:
  image-assets-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run image-asset check
        id: check
        run: |
          python3 scripts/check-image-assets.py | tee image-check.log

      - name: Build step summary
        if: always()
        run: |
          {
            echo "## Image Asset Check"
            echo ""
            echo '```'
            cat image-check.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

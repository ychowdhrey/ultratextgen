name: Ads Check

on:
  pull_request:
    paths:
      - '**/*.html'
      - 'header.js'
      - 'package.json'
      - 'scripts/check-ads.js'
      - '.github/workflows/ads-check.yml'

jobs:
  ads-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ads check
        run: npm run check:ads

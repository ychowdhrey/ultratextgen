name: GTM Check

on:
  pull_request:
    paths:
      - '**/*.html'
      - 'header.js'
      - 'package.json'
      - 'scripts/check-gtm.js'
      - '.github/workflows/gtm-check.yml'

jobs:
  gtm-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run GTM check
        run: npm run check:gtm

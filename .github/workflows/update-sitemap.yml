```yaml
name: Update Sitemap

on:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight UTC

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log lastmod dates

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sitemap generator
        run: node scripts/update-sitemap.js

      - name: Commit updated sitemap.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: regenerate sitemap.xml [skip ci]"
          git push
```

name: CSS Audit

on:
  pull_request:
    paths:
      - '**/*.html'
      - '**/*.css'
      - '**/*.js'
      - 'scripts/audit-css.js'
      - '.github/workflows/css-audit.yml'
  workflow_dispatch:

jobs:
  css-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run CSS audit
        id: audit
        run: |
          npm run audit:css | tee audit.log

      - name: Build step summary
        if: always()
        run: |
          {
            echo "## CSS Audit"
            echo ""
            echo '```'
            cat audit.log
            echo '```'
            echo ""
            echo "Full report and JSON data are uploaded as the **css-audit-reports** artifact below."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: css-audit-reports
          path: reports/
          retention-days: 30

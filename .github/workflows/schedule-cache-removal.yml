name: Auto-Remove Clear-Site-Data Header
on:
  schedule:
    - cron: '0 0 10 4 *'
  workflow_dispatch:

jobs:
  remove-header:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove Clear-Site-Data
        run: |
          sed -i '/# Temporary fix: Tell returning users/,$d' _headers

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: remove temporary Clear-Site-Data header"
          title: "chore: remove temporary Clear-Site-Data header"
          body: "Automated PR to remove the temporary `Clear-Site-Data` header. It has been over a week, and returning users should have their caches cleared by now. Merging this will restore optimal caching performance."
          branch: "chore/remove-clear-site-data"
          base: "main"
